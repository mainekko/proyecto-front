<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Servicios Digitales</title>
    <script>
        // Redirigir todas las rutas a index.html para que Wouter maneje el routing
        const path = window.location.pathname;
        const base = '/proyecto-front/';
        
        // Redirigir a index.html si no es un asset estático
        const isStaticAsset = path.endsWith('.html') || path.endsWith('.js') || path.endsWith('.css') || 
                             path.endsWith('.png') || path.endsWith('.jpg') || path.endsWith('.gif') || 
                             path.endsWith('.svg') || path.endsWith('.ico') || path.endsWith('.json') ||
                             path.endsWith('.webp') || path.includes('/assets/') || path.includes('/__manus__/');
        
        if (!isStaticAsset) {
            window.location.href = base + 'index.html';
        }
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
