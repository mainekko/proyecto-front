<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Plataforma Servicios</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script>
    // Soporte para rutas SPA en GitHub Pages junto con 404.html
    (function () {
      const location = window.location;
      if (location.search[1] === '/') {
        const decoded = location.search
          .slice(1)
          .split('&')
          .map(function (s) { return s.replace(/~and~/g, '&'); })
          .join('?');

        window.history.replaceState(
          null,
          '',
          location.pathname.slice(0, -1) + decoded + location.hash
        );
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
