<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TechServices Pro</title>
  <script>
    // Script para manejar rutas SPA en GitHub Pages.
    // GitHub Pages no soporta rutas HTML5 (pushState) de forma nativa.
    // Este script redirige las rutas 404 a index.html con la ruta como query parameter.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
